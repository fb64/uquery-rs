name: uQuery Release (binaries, docker)

# Triggered on version tags or manually.
# Manual dispatch accepts an optional tag so a failed release can be retried
# against an existing tag without creating a new one.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to re-release (e.g. v0.6.0). Leave empty for a dry run.'
        required: false
        default: ''
  push:
    tags:
      - "v*.*.*"

jobs:
  # ── Linux binaries ──────────────────────────────────────────────────────────
  # Each target runs on a native runner — no cross-compilation, no Docker toolchain.
  # i686 builds on the x86_64 runner using gcc-multilib (32-bit support on 64-bit host).
  # aarch64 uses GitHub's native arm64 runner (ubuntu-24.04-arm).
  build-linux:
    name: Linux / ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
            runner: ubuntu-latest
          - target: i686-unknown-linux-gnu
            arch: i686
            runner: ubuntu-latest
            multilib: true
          - target: aarch64-unknown-linux-gnu
            arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Required to compile 32-bit binaries on the 64-bit x86_64 runner.
      - name: Install multilib (i686 only)
        if: matrix.multilib
        run: sudo apt-get install -y gcc-multilib g++-multilib

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      # Raw binary — smoke-test and docker jobs use amd64/arm64, release job packages all three.
      - uses: actions/upload-artifact@v4
        with:
          name: binary-linux-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/uquery
          retention-days: 1

  # ── macOS binaries ──────────────────────────────────────────────────────────
  # macos-latest is arm64; Rust's toolchain handles cross-compilation to x86_64.
  build-macos:
    name: macOS / ${{ matrix.arch }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            arch: amd64
          - target: aarch64-apple-darwin
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: binary-macos-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/uquery
          retention-days: 1

  # ── Smoke tests ─────────────────────────────────────────────────────────────
  # Each platform is tested on a native runner (no QEMU emulation).
  # Both must pass before the image is published.
  smoke-test:
    name: Docker - smoke test / ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    needs: build-linux
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: binary-linux-${{ matrix.arch }}
          path: bin

      # Dockerfile expects bin/uquery-<arch>; the artifact lands as bin/uquery.
      - name: Prepare bin directory
        run: |
          mv bin/uquery bin/uquery-${{ matrix.arch }}
          chmod +x bin/uquery-${{ matrix.arch }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          load: true
          tags: uquery:smoke-test

      - name: Run smoke tests
        run: |
          chmod +x tests/docker_smoke_test.sh
          tests/docker_smoke_test.sh uquery:smoke-test

  # ── Docker image ────────────────────────────────────────────────────────────
  # Smoke tests passed on both platforms — build the final multi-platform image and push.
  docker:
    name: Docker - Final build
    runs-on: ubuntu-latest
    needs: smoke-test

    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/uquery
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      # Download only the two architectures needed for the multi-platform image.
      - name: Download Linux binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-linux-{amd64,arm64}
          path: bin
          merge-multiple: false

      # Flatten artifact subdirectories into bin/uquery-<arch> as expected by Dockerfile.
      - name: Prepare bin directory
        run: |
          mv bin/binary-linux-amd64/uquery bin/uquery-amd64
          mv bin/binary-linux-arm64/uquery bin/uquery-arm64
          chmod +x bin/uquery-amd64 bin/uquery-arm64

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Push only on tag triggers; manual runs validate the full pipeline without publishing.
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-to: type=gha,mode=max
          cache-from: type=gha

  # ── GitHub Release ──────────────────────────────────────────────────────────
  # Runs on tags or when a tag is supplied via workflow_dispatch.
  # The release is created as a DRAFT so it can be reviewed before publishing.
  # To retry a failed release without a new tag: re-trigger via workflow_dispatch
  # and set the tag input (e.g. v0.6.0).
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [docker, build-macos]
    if: startsWith(github.ref, 'refs/tags/') || inputs.tag != ''

    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: artifacts
          merge-multiple: false

      - name: Package as tarballs
        run: |
          mkdir release
          tar -C artifacts/binary-linux-amd64  -czf release/uquery-x86_64-unknown-linux-gnu.tar.gz  uquery
          tar -C artifacts/binary-linux-i686   -czf release/uquery-i686-unknown-linux-gnu.tar.gz    uquery
          tar -C artifacts/binary-linux-arm64  -czf release/uquery-aarch64-unknown-linux-gnu.tar.gz uquery
          tar -C artifacts/binary-macos-amd64  -czf release/uquery-x86_64-apple-darwin.tar.gz       uquery
          tar -C artifacts/binary-macos-arm64  -czf release/uquery-aarch64-apple-darwin.tar.gz      uquery

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          draft: true
          files: release/*.tar.gz